name: World Heartbeat

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  verify-and-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Test
        run: pytest -q
      - name: Build world state
        run: python -m agent_world.cli heartbeat