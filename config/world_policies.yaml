policies:
  - id: city_autonomy_limits
    rule: No city may unilaterally exile another city.
    enforcement: world_governance_gate
    requires: supermajority_of_cities
  - id: cross_city_visa_recognition
    rule: CITIZEN visas issued by founding or verified cities may be recognized across the world.
    enforcement: declarative
    trust_minimum: verified
  - id: federation_bandwidth_quota
    rule: No city may consume more than 30 percent of the shared federation message budget within one hour.
    enforcement: world_rate_limiter
    window_s: 3600

  - id: federation_ci_required
    rule: Federation repos must have CI that runs on pull_request. Repos without PR-triggered CI receive trust penalty.
    enforcement: trust_penalty
    trust_penalty: 0.2
    verification: steward_diagnostic
    remediation: agent_template_ci_workflow

  - id: federation_descriptor_required
    rule: Federation repos must have .well-known/agent-federation.json. Missing descriptor means invisible to the network.
    enforcement: trust_penalty
    trust_penalty: 0.3
    verification: steward_diagnostic
    remediation: steward_healer

  - id: federation_devcontainer_required
    rule: Federation repos must include .devcontainer/devcontainer.json for zero-config container-based development across all platforms.
    enforcement: trust_penalty
    trust_penalty: 0.15
    verification: steward_diagnostic
    remediation: agent_template_devcontainer
